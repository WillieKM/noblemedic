<!DOCTYPE html>
<html>

<head>

<title>Book Medical Transportation</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h1>Noble Medic Wheels</h1>

<nav>

<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="booking.html">Book Ride</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>

</nav>

</header>
<section class="quote-tool">

<h2>Instant Ride Estimate</h2>

<p>Enter trip details to see an estimated transportation cost.</p>

<label>Pickup Address</label>
<input type="text" id="pickupLocation" placeholder="Enter pickup location">

<label>Destination</label>
<input type="text" id="dropLocation" placeholder="Enter destination">

<label>Distance (miles)</label>
<input type="number" id="distance" placeholder="Enter distance">

<label>Transport Type</label>

<select id="transportType">
<option value="ambulatory">Ambulatory</option>
<option value="wheelchair">Wheelchair Accessible</option>
</select>

<button onclick="calculateRide()">Calculate Estimate</button>

<p id="quoteOutput"></p>

</section>

<section class="booking">

<h2>Request Transportation</h2>

<form action="https://formsubmit.co/YOUR_EMAIL" method="POST">

<input type="text" name="name" placeholder="Patient Name" required>

<input type="tel" name="phone" placeholder="Phone Number" required>

<input type="date" name="date" required>

<input type="time" name="time" required>

<input type="text" name="pickup" placeholder="Pickup Address" required>

<input type="text" name="dropoff" placeholder="Drop-off Address" required>

<select name="transport">

<option>Wheelchair Transport</option>
<option>Ambulatory Transport</option>
<option>Hospital Discharge</option>
<option>Dialysis Transportation</option>

</select>

<textarea name="notes" placeholder="Additional Notes"></textarea>

<button type="submit">Submit Request</button>

</form>

</section>
<script>

function calculateRide(){

let miles = document.getElementById("distance").value;
let transport = document.getElementById("transportType").value;

let baseFare = 50;
let perMile = 3.50;

if(transport === "wheelchair"){
perMile = 4;
}

let total = baseFare + (miles * perMile);

document.getElementById("quoteOutput").innerHTML =
"Estimated Transportation Cost: $" + total;

}

</script>
</body>

</html>
